<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - Tu Cafeteria</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3C2A21">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta BRUNA - Chill & Fachero */
            --bg-dark: #3C2A21;
            --bg-darker: #2A1D16;
            --bg-darkest: #1A110C;
            --cream: #E5E0DA;
            --cream-soft: rgba(229, 224, 218, 0.12);
            --cream-glow: rgba(229, 224, 218, 0.25);
            --bronze: #B09B71;
            --bronze-soft: rgba(176, 155, 113, 0.15);
            --bronze-glow: rgba(176, 155, 113, 0.5);
            
            /* Colores aurora */
            --aurora-1: rgba(176, 155, 113, 0.3);
            --aurora-2: rgba(139, 90, 43, 0.2);
            --aurora-3: rgba(90, 70, 50, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-darkest);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--cream);
            position: relative;
        }

        /* === FONDO AURORA ANIMADO === */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--bg-darkest);
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatAurora 20s ease-in-out infinite;
        }

        .aurora-blob:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--aurora-1);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .aurora-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--aurora-2);
            bottom: -50px;
            right: -80px;
            animation-delay: -5s;
        }

        .aurora-blob:nth-child(3) {
            width: 300px;
            height: 300px;
            background: var(--aurora-3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatAurora {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* === CONTENEDOR PRINCIPAL === */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
        }

        /* === PANTALLA REGISTRO === */
        #pantallaRegistro {
            display: none;
            text-align: center;
        }

        .registro-card {
            background: rgba(60, 42, 33, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 32px;
            border: 1px solid rgba(229, 224, 218, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, var(--cream), #D4CFC9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(229, 224, 218, 0.1);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(229, 224, 218, 0.1); }
            50% { box-shadow: 0 20px 60px rgba(176, 155, 113, 0.2), 0 0 0 1px rgba(229, 224, 218, 0.2); }
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--bg-dark);
            font-size: 28px;
            letter-spacing: 2px;
        }

        .welcome-text {
            font-size: 15px;
            color: var(--cream);
            opacity: 0.7;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            font-size: 13px;
            color: var(--cream);
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            opacity: 0.8;
        }

        .input-box {
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            border: 1.5px solid rgba(229, 224, 218, 0.1);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            color: var(--cream);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .input-box::placeholder {
            color: var(--cream);
            opacity: 0.35;
        }

        .input-box:focus {
            border-color: var(--bronze);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(176, 155, 113, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 20px 32px;
            border-radius: 16px;
            border: none;
            background: var(--bronze);
            color: var(--bg-darkest);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(176, 155, 113, 0.3);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        #btnInstalarApp {
            display: none;
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            border-radius: 14px;
            border: 1.5px solid rgba(229, 224, 218, 0.15);
            background: transparent;
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btnInstalarApp:hover {
            background: rgba(229, 224, 218, 0.05);
            border-color: rgba(229, 224, 218, 0.25);
        }

        /* === PANTALLA TARJETA === */
        #pantallaTarjeta {
            display: none;
        }

        .texto-girar {
            text-align: center;
            font-size: 13px;
            color: var(--cream);
            opacity: 0.5;
            margin-bottom: 20px;
            font-weight: 500;
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* === FLIP CARD === */
        .flip-container {
            perspective: 1500px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }

        .flipper {
            display: grid;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .front, .back {
            grid-area: 1 / 1;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
        }

        .front { transform: rotateY(0deg); }
        .back { transform: rotateY(180deg); }

        /* === TARJETA PRINCIPAL === */
        .wallet-card {
            background: rgba(60, 42, 33, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 32px;
            border: 1px solid rgba(229, 224, 218, 0.08);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
        }

        .logo-small {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: var(--cream);
            letter-spacing: 2px;
        }

        .logo-tagline {
            font-size: 11px;
            color: var(--bronze);
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
            text-transform: uppercase;
        }

        .user-info {
            text-align: right;
        }

        .user-nickname {
            font-size: 16px;
            font-weight: 700;
            color: var(--cream);
        }

        .user-tel-label {
            font-size: 12px;
            color: var(--cream);
            opacity: 0.5;
            font-weight: 500;
            display: block;
            margin-top: 4px;
        }

        /* === STAMPS/SELLOS === */
        .stamps-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(229, 224, 218, 0.05);
        }

        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
            justify-items: center;
        }

        /* === TAZAS ANIMADAS === */
        .stamp-cup {
            width: 44px;
            height: 44px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stamp-cup .cup-path {
            fill: none;
            stroke: rgba(229, 224, 218, 0.2);
            stroke-width: 2;
            transition: all 0.4s ease;
        }

        .stamp-cup .coffee-fill {
            fill: none;
            opacity: 0;
            transition: all 0.4s ease;
        }

        /* === TAZA ILUSTRATIVA ESTILO CAFE === */
        .stamp-cup .cup-outer {
            fill: none;
            stroke: rgba(229, 224, 218, 0.2);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .stamp-cup .cup-inner {
            fill: rgba(229, 224, 218, 0.05);
            stroke: none;
        }

        .stamp-cup .cup-handle {
            fill: none;
            stroke: rgba(229, 224, 218, 0.2);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .stamp-cup .coffee-liquid {
            fill: none;
            opacity: 0;
        }

        .stamp-cup .latte-art {
            fill: none;
            stroke: none;
            opacity: 0;
        }

        .stamp-cup .steam-wisp {
            fill: none;
            stroke: var(--cream);
            stroke-width: 1.5;
            stroke-linecap: round;
            opacity: 0;
        }

        .stamp-cup .steam-particle {
            fill: var(--cream);
            opacity: 0;
        }

        /* Taza llena - transformacion completa */
        .stamp-cup.filled {
            transform: scale(1.12);
            filter: drop-shadow(0 6px 16px rgba(176, 155, 113, 0.5));
            animation: cupAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cupAppear {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            50% { transform: scale(1.15) rotate(2deg); }
            100% { transform: scale(1.12) rotate(0deg); opacity: 1; }
        }

        .stamp-cup.filled .cup-outer {
            fill: var(--bronze);
            stroke: #C4AF8A;
            stroke-width: 2;
        }

        .stamp-cup.filled .cup-inner {
            fill: #8B6914;
        }

        .stamp-cup.filled .cup-handle {
            stroke: var(--bronze);
            stroke-width: 3;
        }

        .stamp-cup.filled .coffee-liquid {
            fill: #1A110C;
            opacity: 1;
            animation: liquidPour 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
        }

        .stamp-cup.filled .latte-art {
            fill: #D4C4A8;
            stroke: #C4B090;
            stroke-width: 0.5;
            opacity: 0;
            animation: latteReveal 0.4s ease-out 0.6s forwards;
        }

        @keyframes liquidPour {
            0% { 
                clip-path: ellipse(0% 0% at 50% 50%);
                opacity: 0;
            }
            100% { 
                clip-path: ellipse(100% 100% at 50% 50%);
                opacity: 1;
            }
        }

        @keyframes latteReveal {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0.9; transform: scale(1); }
        }

        /* === VAPOR ULTRA REALISTA === */
        .stamp-cup.filled .steam-wisp {
            stroke: var(--cream);
        }

        .stamp-cup.filled .steam-1 {
            animation: steamRise1 2.8s ease-out infinite;
        }

        .stamp-cup.filled .steam-2 {
            animation: steamRise2 3.2s ease-out infinite;
            animation-delay: 0.4s;
        }

        .stamp-cup.filled .steam-3 {
            animation: steamRise3 2.6s ease-out infinite;
            animation-delay: 0.8s;
        }

        .stamp-cup.filled .steam-4 {
            animation: steamRise4 3s ease-out infinite;
            animation-delay: 0.2s;
        }

        .stamp-cup.filled .steam-5 {
            animation: steamRise5 2.4s ease-out infinite;
            animation-delay: 0.6s;
        }

        /* Particulas flotantes de vapor */
        .stamp-cup.filled .particle-1 {
            animation: particleFloat1 3.5s ease-out infinite;
        }

        .stamp-cup.filled .particle-2 {
            animation: particleFloat2 4s ease-out infinite;
            animation-delay: 0.5s;
        }

        .stamp-cup.filled .particle-3 {
            animation: particleFloat3 3.2s ease-out infinite;
            animation-delay: 1s;
        }

        /* Animaciones de vapor serpentino organico */
        @keyframes steamRise1 {
            0% {
                d: path("M40,28 Q38,22 42,18 Q46,14 43,8");
                opacity: 0;
            }
            15% {
                opacity: 0.7;
            }
            50% {
                d: path("M40,28 Q44,22 40,16 Q36,10 40,4");
                opacity: 0.5;
            }
            100% {
                d: path("M40,28 Q36,20 42,14 Q48,8 44,0");
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        @keyframes steamRise2 {
            0% {
                d: path("M50,26 Q48,20 52,15 Q56,10 52,4");
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            60% {
                d: path("M50,26 Q54,19 50,13 Q46,7 50,1");
                opacity: 0.4;
            }
            100% {
                d: path("M50,26 Q46,18 52,12 Q58,6 52,-2");
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        @keyframes steamRise3 {
            0% {
                d: path("M60,28 Q62,22 58,17 Q54,12 58,6");
                opacity: 0;
            }
            25% {
                opacity: 0.55;
            }
            65% {
                d: path("M60,28 Q56,21 60,15 Q64,9 60,3");
                opacity: 0.35;
            }
            100% {
                d: path("M60,28 Q64,20 58,14 Q52,8 58,0");
                opacity: 0;
                transform: translateY(-9px);
            }
        }

        @keyframes steamRise4 {
            0% {
                d: path("M45,27 Q43,21 47,16 Q51,11 47,5");
                opacity: 0;
            }
            18% {
                opacity: 0.5;
            }
            55% {
                d: path("M45,27 Q49,20 45,14 Q41,8 45,2");
                opacity: 0.35;
            }
            100% {
                d: path("M45,27 Q41,19 47,13 Q53,7 47,-1");
                opacity: 0;
                transform: translateY(-7px);
            }
        }

        @keyframes steamRise5 {
            0% {
                d: path("M55,27 Q57,21 53,16 Q49,11 53,5");
                opacity: 0;
            }
            22% {
                opacity: 0.45;
            }
            60% {
                d: path("M55,27 Q51,20 55,14 Q59,8 55,2");
                opacity: 0.3;
            }
            100% {
                d: path("M55,27 Q59,19 53,13 Q47,7 53,-1");
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        /* Particulas flotantes */
        @keyframes particleFloat1 {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translate(-5px, -25px) scale(0.3); opacity: 0; }
        }

        @keyframes particleFloat2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            25% { opacity: 0.5; }
            100% { transform: translate(6px, -28px) scale(0.2); opacity: 0; }
        }

        @keyframes particleFloat3 {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            30% { opacity: 0.4; }
            100% { transform: translate(-3px, -22px) scale(0.4); opacity: 0; }
        }

        /* Stagger animation para las tazas */
        .stamp-cup.filled:nth-child(1) { animation-delay: 0ms; }
        .stamp-cup.filled:nth-child(2) { animation-delay: 50ms; }
        .stamp-cup.filled:nth-child(3) { animation-delay: 100ms; }
        .stamp-cup.filled:nth-child(4) { animation-delay: 150ms; }
        .stamp-cup.filled:nth-child(5) { animation-delay: 200ms; }
        .stamp-cup.filled:nth-child(6) { animation-delay: 250ms; }
        .stamp-cup.filled:nth-child(7) { animation-delay: 300ms; }
        .stamp-cup.filled:nth-child(8) { animation-delay: 350ms; }
        .stamp-cup.filled:nth-child(9) { animation-delay: 400ms; }
        .stamp-cup.filled:nth-child(10) { animation-delay: 450ms; }

        .stamps-text {
            text-align: center;
            font-size: 12px;
            color: var(--cream);
            opacity: 0.5;
            margin: 0;
            font-weight: 500;
        }

        /* === INFO ROW === */
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .info-label {
            font-size: 11px;
            color: var(--cream);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .info-value {
            font-weight: 700;
            font-size: 15px;
            color: var(--cream);
        }

        .info-value-points {
            font-size: 28px;
            font-weight: 800;
            color: var(--bronze);
            font-family: 'Space Grotesk', sans-serif;
        }

        .premio-listo {
            color: var(--bronze) !important;
            animation: celebratePulse 1.5s ease-in-out infinite;
        }

        @keyframes celebratePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 20px var(--bronze-glow); }
        }

        /* === QR SECTION === */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .qr-box {
            background: var(--cream);
            padding: 14px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .qr-box img {
            display: block;
            width: 110px;
            height: 110px;
        }

        .user-id {
            font-size: 11px;
            color: var(--cream);
            opacity: 0.4;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* === DORSO TARJETA === */
        .back {
            background: rgba(60, 42, 33, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            border: 1px solid rgba(229, 224, 218, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 500px;
        }

        .back-logo-circle {
            width: 160px;
            height: 160px;
            background: linear-gradient(145deg, var(--cream), #D4CFC9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .back-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--bg-dark);
            font-size: 32px;
            letter-spacing: 2px;
            margin: 0;
        }

        .back-subtitle {
            font-size: 14px;
            color: var(--bronze);
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* === BOTON CERRAR SESION === */
        .btn-cerrar {
            margin-top: 32px;
            background: none;
            color: var(--cream);
            opacity: 0.4;
            border: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 16px;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .btn-cerrar:hover {
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.03);
        }

        /* === ESTADOS === */
        #cargando {
            font-size: 14px;
            text-align: center;
            color: var(--cream);
            opacity: 0.6;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .loading-dots::after {
            content: '';
            animation: loadingDots 1.5s infinite;
        }

        @keyframes loadingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* === MODAL === */
        .custom-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 17, 12, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .custom-modal-box {
            background: rgba(60, 42, 33, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 36px 28px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(229, 224, 218, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .custom-modal-text {
            color: var(--cream);
            font-size: 15px;
            margin-bottom: 28px;
            font-weight: 500;
            line-height: 1.6;
        }

        .btn-modal-ok {
            width: 100%;
            background: var(--bronze);
            color: var(--bg-darkest);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-modal-ok:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(176, 155, 113, 0.3);
        }

        /* === RESPONSIVE === */
        @media (max-width: 380px) {
            .wallet-card { padding: 24px; }
            .stamps-grid { gap: 8px; }
            .stamp-cup { width: 38px; height: 38px; }
            .logo-small { font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- Fondo Aurora Animado -->
    <div class="aurora-bg">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <!-- Modal de Alertas -->
    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" class="custom-modal-text">Mensaje de error</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Entendido</button>
        </div>
    </div>

    <div class="main-container">
        <div id="cargando">Preparando tu experiencia<span class="loading-dots"></span></div>

        <!-- PANTALLA REGISTRO -->
        <div id="pantallaRegistro">
            <div class="registro-card">
                <div class="logo-container">
                    <div class="logo-circle">
                        <span class="logo-text">BRUNA</span>
                    </div>
                    <p class="welcome-text">Tu cafeteria de siempre</p>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Tu nombre</label>
                    <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon" required>
                </div>
                
                <div class="input-group">
                    <label class="input-label">WhatsApp</label>
                    <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234" required>
                </div>
                
                <button class="btn-primary" id="btnCrearTarjeta">Obtener mi tarjeta</button>
                <button id="btnInstalarApp">Instalar app en tu celular</button>
            </div>
        </div>

        <!-- PANTALLA TARJETA -->
        <div id="pantallaTarjeta">
            <p class="texto-girar">Toca la tarjeta para girarla</p>
            
            <div class="flip-container" onclick="this.classList.toggle('flipped')">
                <div class="flipper">
                    <!-- FRENTE -->
                    <div class="front">
                        <div class="wallet-card">
                            <div class="card-header">
                                <div>
                                    <div class="logo-small">BRUNA</div>
                                    <span class="logo-tagline">Tu cafeteria</span>
                                </div>
                                <div class="user-info">
                                    <div class="user-nickname" id="displayNombre">...</div>
                                    <span class="user-tel-label" id="displayTelLabel">******0000</span>
                                </div>
                            </div>
                            
                            <div class="stamps-container">
                                <div class="stamps-grid" id="gridSellos"></div>
                                <p class="stamps-text">Completa 10 tazas y lleva tu bebida gratis</p>
                            </div>
                            
                            <div class="info-row">
                                <div>
                                    <div class="info-label">Estado</div>
                                    <div class="info-value" id="displayPremio">...</div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="info-label">Progreso</div>
                                    <div class="info-value info-value-points"><span id="displayPuntos">0</span>/10</div>
                                </div>
                            </div>
                            
                            <div class="qr-section">
                                <div class="qr-box"><img id="qrImage" src="" alt="QR Cliente"></div>
                                <div class="user-id">Tu codigo personal</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- DORSO -->
                    <div class="back">
                        <div class="back-logo-circle">
                            <h2 class="back-logo-text">BRUNA</h2>
                        </div>
                        <div class="back-subtitle">Bakery</div>
                    </div>
                </div>
            </div>
            
            <button id="btnCerrarSesion" class="btn-cerrar">Cerrar sesion en este dispositivo</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        class BrunaApp {
            constructor() {
                const firebaseConfig = {
                    apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
                    authDomain: "club-cafe-app.firebaseapp.com",
                    databaseURL: "https://club-cafe-app-default-rtdb.firebaseio.com",
                    projectId: "club-cafe-app",
                    storageBucket: "club-cafe-app.firebasestorage.app",
                    messagingSenderId: "1007849307452",
                    appId: "1:1007849307452:web:2472f6b2cab7deeae53239",
                    measurementId: "G-6314S7TS0T"
                };
                
                this.app = initializeApp(firebaseConfig);
                this.db = getFirestore(this.app);
                this.unsubscribe = null;

                this.ui = {
                    cargando: document.getElementById('cargando'),
                    registro: document.getElementById('pantallaRegistro'),
                    tarjeta: document.getElementById('pantallaTarjeta'),
                    nombre: document.getElementById('displayNombre'),
                    telLabel: document.getElementById('displayTelLabel'),
                    qr: document.getElementById('qrImage'),
                    gridSellos: document.getElementById('gridSellos'),
                    puntos: document.getElementById('displayPuntos'),
                    premio: document.getElementById('displayPremio'),
                    modalAlerta: document.getElementById('modalAlertaCustom'),
                    textoAlerta: document.getElementById('textoAlertaCustom')
                };

                this.vincularEventos();
                this.iniciar();
            }

            vincularEventos() {
                document.getElementById('btnCrearTarjeta').addEventListener('click', () => this.ingresar());
                document.getElementById('btnCerrarSesion').addEventListener('click', () => this.cerrarSesion());
                
                document.getElementById('btnCerrarAlerta').addEventListener('click', () => {
                    this.ui.modalAlerta.style.display = 'none';
                });
            }

            mostrarAlerta(mensaje) {
                this.ui.textoAlerta.innerText = mensaje;
                this.ui.modalAlerta.style.display = 'flex';
            }

            iniciar() {
                const celularLocal = localStorage.getItem('miTarjetaCafeTEL');
                if (celularLocal) {
                    this.abrirTarjeta(celularLocal);
                } else {
                    this.cambiarPantalla('registro');
                }
            }

            cambiarPantalla(pantalla) {
                this.ui.cargando.style.display = pantalla === 'cargando' ? 'block' : 'none';
                this.ui.registro.style.display = pantalla === 'registro' ? 'block' : 'none';
                this.ui.tarjeta.style.display = pantalla === 'tarjeta' ? 'block' : 'none';
            }

            formatearNombre(texto) {
                if (!texto) return "";
                return texto.trim().toLowerCase().replace(/\b\w/g, letra => letra.toUpperCase());
            }

            async ingresar() {
                const nombreIngresado = document.getElementById('inputNombre').value;
                const nombre = this.formatearNombre(nombreIngresado);
                let celular = document.getElementById('inputCelular').value.trim();

                if(!nombre || !celular) return this.mostrarAlerta("Por favor completa tu nombre y numero para continuar.");
                
                celular = celular.replace(/\D/g,''); 
                if(celular.length < 8) return this.mostrarAlerta("El numero de WhatsApp es demasiado corto. Revisa que este bien escrito.");

                this.cambiarPantalla('cargando');
                this.ui.cargando.innerHTML = "Sincronizando tu tarjeta<span class='loading-dots'></span>";

                try {
                    const docRef = doc(this.db, "clientes", celular);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        await setDoc(docRef, { nombre: nombre }, { merge: true });
                    } else {
                        await setDoc(docRef, { 
                            nombre: nombre, 
                            puntos: 0,
                            fechaRegistro: new Date().toISOString()
                        });
                    }
                    
                    localStorage.setItem('miTarjetaCafeTEL', celular);
                    this.abrirTarjeta(celular);
                } catch (e) {
                    console.error("Error:", e);
                    this.mostrarAlerta("Hubo un error de conexion. Revisa tu internet e intenta de nuevo.");
                    this.cambiarPantalla('registro');
                }
            }

            abrirTarjeta(celular) {
                this.cambiarPantalla('tarjeta');
                
                this.ui.qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${celular}&bgcolor=E5E0DA&color=3C2A21`;
                this.ui.telLabel.innerText = `******${celular.slice(-4)}`;

                this.unsubscribe = onSnapshot(doc(this.db, "clientes", celular), (docSnap) => {
                    if (docSnap.exists()) {
                        const datos = docSnap.data();
                        this.ui.nombre.innerText = datos.nombre;
                        this.renderizarTazas(datos.puntos);
                    } else {
                        this.cerrarSesion(); 
                    }
                });
            }

            renderizarTazas(puntosActuales) {
                const totalTazas = 10;
                this.ui.gridSellos.innerHTML = ''; 

                for (let i = 1; i <= totalTazas; i++) {
                    const contenedorSvg = document.createElement('div');
                    contenedorSvg.innerHTML = this.obtenerSvgTaza();
                    const svgElement = contenedorSvg.querySelector('svg'); 
                    
                    if (i <= puntosActuales) {
                        svgElement.classList.add('filled');
                    }
                    this.ui.gridSellos.appendChild(svgElement);
                }

                this.ui.puntos.innerText = puntosActuales;
                
                if(puntosActuales >= totalTazas) {
                    this.ui.premio.innerText = "Bebida lista!";
                    this.ui.premio.classList.add('premio-listo');
                } else {
                    this.ui.premio.innerText = "En progreso";
                    this.ui.premio.classList.remove('premio-listo');
                }
            }

            obtenerSvgTaza() {
                return `
                <svg class="stamp-cup" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- VAPOR ULTRA REALISTA - 5 lineas serpenteantes -->
                    <path class="steam-wisp steam-1" d="M40,28 Q38,22 42,18 Q46,14 43,8"/>
                    <path class="steam-wisp steam-2" d="M50,26 Q48,20 52,15 Q56,10 52,4"/>
                    <path class="steam-wisp steam-3" d="M60,28 Q62,22 58,17 Q54,12 58,6"/>
                    <path class="steam-wisp steam-4" d="M45,27 Q43,21 47,16 Q51,11 47,5"/>
                    <path class="steam-wisp steam-5" d="M55,27 Q57,21 53,16 Q49,11 53,5"/>
                    
                    <!-- Particulas de vapor flotantes -->
                    <circle class="steam-particle particle-1" cx="42" cy="20" r="2"/>
                    <circle class="steam-particle particle-2" cx="55" cy="18" r="1.5"/>
                    <circle class="steam-particle particle-3" cx="48" cy="15" r="1.8"/>
                    
                    <!-- TAZA ESTILO ILUSTRATIVO FRESCO -->
                    <!-- Interior de la taza (sombra) -->
                    <ellipse class="cup-inner" cx="50" cy="34" rx="24" ry="5"/>
                    
                    <!-- Cuerpo de la taza - forma redondeada amigable -->
                    <path class="cup-outer" d="M26,33 
                        L24,70 
                        Q24,85 36,87 
                        L64,87 
                        Q76,85 76,70 
                        L74,33 
                        Q74,30 70,30 
                        L30,30 
                        Q26,30 26,33 Z"/>
                    
                    <!-- Cafe liquido -->
                    <ellipse class="coffee-liquid" cx="50" cy="35" rx="22" ry="4.5"/>
                    
                    <!-- Arte Latte - corazon/hoja estilizado -->
                    <path class="latte-art" d="M50,33 
                        Q46,35 48,38 
                        Q50,40 50,42 
                        Q50,40 52,38 
                        Q54,35 50,33 Z
                        M50,42 L50,46"/>
                    
                    <!-- Borde superior grueso de la taza -->
                    <ellipse class="cup-outer" cx="50" cy="30" rx="26" ry="4" style="stroke-width: 3"/>
                    
                    <!-- Asa de la taza - curva gruesa y amigable -->
                    <path class="cup-handle" d="M74,40 
                        Q88,40 90,55 
                        Q90,70 74,70"/>
                    
                    <!-- Detalle de brillo en la taza -->
                    <path class="cup-highlight" d="M30,38 Q28,50 32,62" 
                        fill="none" 
                        stroke="rgba(255,255,255,0.15)" 
                        stroke-width="2" 
                        stroke-linecap="round"/>
                </svg>`;
            }

            cerrarSesion() {
                if (this.unsubscribe) this.unsubscribe(); 
                localStorage.removeItem('miTarjetaCafeTEL');
                location.reload();
            }
        }

        window.onload = () => {
            new BrunaApp();
        };
    </script>
    
    <script>
        let eventoInstalacion = null;
        const btnInstalar = document.getElementById('btnInstalarApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            eventoInstalacion = e;
            btnInstalar.style.display = 'block'; 
        });

        btnInstalar.addEventListener('click', async () => {
            if (!eventoInstalacion) return;
            
            eventoInstalacion.prompt(); 
            
            const { outcome } = await eventoInstalacion.userChoice;
            if (outcome === 'accepted') {
                btnInstalar.style.display = 'none'; 
            }
            eventoInstalacion = null;
        });

        window.addEventListener('appinstalled', () => {
            btnInstalar.style.display = 'none';
        });
    </script>
</body>
</html>
